{% extends "Base.twig" %}

{% block title %}Accueil - MyGiftBox{% endblock %}

{% block content %}
<h1>Créer une nouvelle box</h1>

<form method="post" action="{{ url_for('boxe_create') }}">
    <div>
        <label for="libelle">Libellé :</label><br>
        <input type="text" id="libelle" name="libelle" required>
    </div>
    <div>
        <label for="description">Description :</label><br>
        <textarea id="description" name="description" rows="4"></textarea>
    </div>

    <div>
        <label for="coffretType" >Type de coffret :</label><br>
        <select id="coffretType" name="coffretType" required>
            {% if coffret != null %}
            <option value="{{ coffret.id }}">{{ coffret.libelle  }}</option>
            {% endif %}
            <option value="">--Sélectionnez un type--</option>
            {% for p in coffret_type_liste %}
            {% if coffret == null or p.id!=coffret.id %}
            <option value="{{ p.id }}">{{ p.libelle }}</option>
            {% endif %}
            {% endfor %}
        </select>
    </div>

    <div>
        <p id="prestationCount">0 prestation(s) ajoutée(s)</p>
    </div>

    <div id="prestations-container"></div>

    <script>
        // 1. On cible les bons ID correspondant exactement à ton HTML
        const selector = document.getElementById('coffretType');
        const container = document.getElementById('prestations-container');
        const countDisplay = document.getElementById('prestationCount');

        selector.addEventListener('change', async (e) => {
            const coffretId = e.target.value;

            if (!coffretId) {
                container.innerHTML = '';
                countDisplay.textContent = '0 prestation(s) ajoutée(s)'; // Remise à zéro
                return;
            }

            container.innerHTML = '<em>Chargement des prestations...</em>';

            try {
                const response = await fetch(`/api/coffrets/${coffretId}/prestations`);

                if (!response.ok) {
                    throw new Error('Erreur réseau');
                }

                const prestations = await response.json();

                let html = '<ul>';
                prestations.forEach(p => {
                    // Note : assure-toi que 'libelle' correspond bien au nom de la colonne dans ta base
                    html += `<li>${p.libelle}</li>`;
                });
                html += '</ul>';

                container.innerHTML = html;

                // 2. Mise à jour dynamique du texte du compteur
                countDisplay.textContent = `${prestations.length} prestation(s) ajoutée(s)`;

            } catch (error) {
                container.innerHTML = "<p>Erreur lors du chargement des prestations.</p>";
                countDisplay.textContent = '0 prestation(s) ajoutée(s)';
            }
        });
    </script>

    <div>
        <label for="kdo">Cadeau ?</label>
        <input type="checkbox" id="kdo" name="kdo">

    </div>

    <div>
        <textarea id="message_kdo" name="message_kdo" rows="4"
            placeholder="Message pour le destinataire (optionnel)"></textarea>
    </div>

    <div>
        <label id="montant">Montant total (€) :</label><br>
    </div>
    <input type="hidden" id="csrf_token" name="csrf_token" value="{{ csrf_token }}">
    <div>
        <button type="submit">Créer la box</button>
    </div>
</form>
{% endblock %}

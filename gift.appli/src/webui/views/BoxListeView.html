{% extends "base.twig" %}

{% block title %}List Box View - MyGiftBox{% endblock %}

{% block content %}
    <h1>Liste des boxes</h1>
    <a href="{{ url_for('boxe_create') }}">Creer box</a>
        <ul class="listbox">
            {% for b in box_liste %}
                <li class="listbox-item">
                    <a href="{{ url_for('boxe_token', {'id': b.id}) }}">{{ b.libelle }}</a>
                </li>
            {% endfor %}
        </ul>
{% endblock %}

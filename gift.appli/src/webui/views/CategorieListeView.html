{% extends "Base.twig" %}

{% block title %}Liste des catégories - MyGiftBox{% endblock %}

{% block content %}
    <h1>Liste des catégories</h1>
    <ul>
        {% for c in categorie_liste %}
            <li>
                <a href="{{ url_for('categorie_detail', {'id': c.id}) }}">{{ c.libelle }}</a>
            </li>
        {% endfor %}
    </ul>
{% endblock %}

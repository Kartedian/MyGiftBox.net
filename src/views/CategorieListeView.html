<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Liste des catégories</title>
    </head>

        <h1>Liste des catégories</h1>
        <ul>

            {% endfor %}
        </ul>
    </body>
</html>
